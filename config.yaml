image:
  height: 256
  width: 256
  channels: 1  # grayscale

paths:
  data_root: "data"
  printed_data: "data/printed"
  handwritten_data: "data/handwritten"
  style_data: "data/styles"
  sample_data: "data/samples"
  checkpoints: "checkpoints"
  outputs: "outputs"
  latex_test_outputs: "outputs/latex_tests"
  # New high-level paths used by the training pipeline
  data_dir: "./data"
  checkpoint_dir: "./checkpoints"
  output_dir: "./outputs"
  samples_dir: "./outputs/samples"

model:
  type: "gan"        # placeholder: e.g. "gan", "diffusion"
  latent_dim: 128
  style_dim: 64
  hidden_dim: 512
  num_layers: 4
  dropout: 0.1

training:
  # Updated training hyperparameters for Pix2Pix
  epochs: 200
  batch_size: 16
  learning_rate: 0.0002
  optimizer: "adam"
  beta1: 0.5
  beta2: 0.999
  lambda_l1: 100
  weight_decay: 0.0
  gradient_clip: 1.0
  checkpoint_interval: 10      # epochs
  log_interval: 10             # batches
  sample_interval: 1           # epochs

inference:
  num_samples: 8
  temperature: 1.0

logging:
  level: "INFO"
  save_images: true

data:
  image_size: 256
  train_split: 0.8
  num_workers: 4
